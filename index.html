<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Запись — Barber Studio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --radius-lg: 16px;
    --radius-md: 12px;
    --radius-sm: 10px;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.04), 0 4px 14px rgba(0,0,0,0.07);
    --transition-fast: 0.14s ease;
    /* Фирменные цвета барбершопа — золото на тёмном янтаре, не зависят от
       акцентного цвета темы Telegram (у него он у всех разный), только
       фон/текст берём из --tg-theme-*, чтобы соблюдался светлый/тёмный режим. */
    --brand-gold: #b8860b;
    --brand-gold-bright: #d4a72c;
    --brand-ink: #241a0f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    padding-bottom: 90px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #faf6ee);
    color: var(--tg-theme-text-color, #241a0f);
  }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; margin: 4px 0 14px; }
  .summary-line {
    display: inline-block;
    font-size: 13px;
    font-weight: 500;
    color: var(--brand-gold);
    background: var(--tg-theme-secondary-bg-color, #f1e6cf);
    padding: 6px 12px;
    border-radius: 999px;
    margin-bottom: 16px;
  }
  .hint { color: var(--tg-theme-hint-color, #8a7a5c); font-size: 14px; }
  .error-text { color: #e53e3e; font-size: 14px; margin-bottom: 12px; }
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    gap: 12px;
  }

  /* ---------- прогресс записи ---------- */
  .progress-wrap { margin-bottom: 18px; }
  .progress-track {
    height: 6px;
    border-radius: 999px;
    background: var(--tg-theme-secondary-bg-color, #f1e6cf);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--brand-gold), var(--brand-gold-bright));
    transition: width 0.25s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--tg-theme-hint-color, #8a7a5c);
    margin-top: 6px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: var(--radius-lg);
    background: var(--tg-theme-secondary-bg-color, #f1e6cf);
    box-shadow: var(--shadow-card);
    cursor: pointer;
    border: none;
    border-left: 3px solid transparent;
    text-align: left;
    transition: transform var(--transition-fast), box-shadow var(--transition-fast), border-color var(--transition-fast);
  }
  .card:hover { border-left-color: var(--brand-gold); }
  .card:active { transform: scale(0.97); box-shadow: none; }
  .card__photo {
    width: 56px;
    height: 56px;
    border-radius: var(--radius-md);
    object-fit: cover;
    flex-shrink: 0;
    background: #dddddd;
  }
  .card__photo--round { border-radius: 50%; }
  .card__body { flex: 1; min-width: 0; }
  .card__title { font-weight: 600; font-size: 15px; }
  .card__subtitle {
    font-size: 13px;
    color: var(--tg-theme-hint-color, #8a7a5c);
    white-space: pre-line;
    margin-top: 2px;
  }
  .card__right {
    font-weight: 700;
    white-space: nowrap;
    color: var(--brand-gold);
  }
  .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 10px 16px;
    border-radius: 999px;
    border: 1px solid transparent;
    background: var(--tg-theme-secondary-bg-color, #f1e6cf);
    color: var(--tg-theme-text-color, #241a0f);
    font-size: 15px;
    cursor: pointer;
    transition: transform var(--transition-fast), border-color var(--transition-fast);
  }
  .chip:active { transform: scale(0.95); border-color: var(--brand-gold); }
  .text-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--tg-theme-hint-color, #ddc9a3);
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #241a0f);
    font-size: 16px;
    margin-bottom: 12px;
    transition: border-color var(--transition-fast);
  }
  .text-input:focus { outline: none; border-color: var(--brand-gold); }
  .primary-btn, .secondary-btn {
    display: block;
    width: 100%;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: transform var(--transition-fast), opacity var(--transition-fast);
  }
  .primary-btn:active, .secondary-btn:active { transform: scale(0.98); opacity: 0.85; }
  .primary-btn {
    background: linear-gradient(135deg, var(--brand-gold-bright), var(--brand-gold));
    color: var(--brand-ink);
    box-shadow: 0 4px 14px rgba(184, 134, 11, 0.35);
  }
  .secondary-btn {
    background: var(--tg-theme-secondary-bg-color, #f1e6cf);
    color: var(--tg-theme-text-color, #241a0f);
    border: 1px solid rgba(184, 134, 11, 0.3);
  }
  .summary-box {
    background: var(--tg-theme-secondary-bg-color, #f1e6cf);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 4px 14px;
    margin-bottom: 16px;
  }
  .summary-row { padding: 10px 0; border-bottom: 1px solid rgba(184, 134, 11, 0.18); }
  .summary-row:last-child { border-bottom: none; }
  .summary-row__label {
    font-size: 12px;
    color: var(--brand-gold);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .summary-row__value { font-size: 15px; white-space: pre-line; margin-top: 2px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.18s ease-out; }
</style>
</head>
<body>
  <div id="app"></div>

  <script>
    // Для теста вне настоящего Telegram-клиента (или если API поднят не
    // локально) поменяй этот адрес на свой — см. README, раздел про /app.
    var API_URL = "https://rv5l8d7v-8000.euw.devtunnels.ms";

    var tg = window.Telegram ? window.Telegram.WebApp : null;

    // ---------- состояние воронки ----------
    var state = { service: null, salon: null, master: null, date: null, time: null, name: "", phone: "" };
    // Не называем "history" — это зарезервированное имя window.history,
    // присвоение молча не срабатывает (в нестрогом режиме), а
    // history.push(...) падает с TypeError, потому что у нативного
    // History нет метода push — из-за этого не работали клики по карточкам.
    var stepHistory = [];
    var currentStep = "menu";
    var mainButtonHandler = null;

    // ---------- мелкие DOM-хелперы ----------
    function el(tag, cls, text) {
      var e = document.createElement(tag);
      if (cls) e.className = cls;
      if (text !== undefined) e.textContent = text;
      return e;
    }

    function mount(node) {
      var app = document.getElementById("app");
      app.innerHTML = "";
      node.classList.add("fade-in");
      app.appendChild(node);
    }

    // ---------- прогресс записи ----------
    // Экраны вне воронки (меню, "мои записи", отзывы) в этот список не
    // входят — stepProgress() для них вернёт null, и полоса просто не
    // покажется.
    var STEP_ORDER = ["service", "salon", "master", "date", "time", "name", "phone", "confirm"];

    function stepProgress(step) {
      var idx = STEP_ORDER.indexOf(step);
      if (idx === -1) return null;
      return { index: idx + 1, total: STEP_ORDER.length };
    }

    function renderProgressBar(step) {
      var p = stepProgress(step);
      if (!p) return null;
      var wrap = el("div", "progress-wrap");
      var track = el("div", "progress-track");
      var fill = el("div", "progress-fill");
      fill.style.width = Math.round((p.index / p.total) * 100) + "%";
      track.appendChild(fill);
      wrap.appendChild(track);
      wrap.appendChild(el("div", "progress-label", "Шаг " + p.index + " из " + p.total));
      return wrap;
    }

    function stepRoot(step) {
      var root = el("div");
      var bar = renderProgressBar(step);
      if (bar) root.appendChild(bar);
      return root;
    }

    function card(opts) {
      var c = el("button", "card");
      if (opts.photo) {
        var img = el("img", "card__photo" + (opts.round ? " card__photo--round" : ""));
        img.src = opts.photo;
        img.alt = "";
        img.onerror = function () { img.style.display = "none"; };
        c.appendChild(img);
      }
      var body = el("div", "card__body");
      body.appendChild(el("div", "card__title", opts.title));
      if (opts.subtitle) body.appendChild(el("div", "card__subtitle", opts.subtitle));
      c.appendChild(body);
      if (opts.right) c.appendChild(el("div", "card__right", opts.right));
      c.addEventListener("click", opts.onClick);
      return c;
    }

    function summaryLine() {
      var parts = [];
      if (state.service) parts.push(state.service.name);
      if (state.salon) parts.push(state.salon.name);
      if (state.master) parts.push(state.master.name);
      if (state.date) parts.push(state.date);
      if (!parts.length) return el("div");
      return el("div", "summary-line", parts.join(" · "));
    }

    function summaryRow(label, value) {
      var row = el("div", "summary-row");
      row.appendChild(el("div", "summary-row__label", label));
      row.appendChild(el("div", "summary-row__value", value));
      return row;
    }

    function renderLoading(text, step) {
      var root = stepRoot(step);
      var center = el("div", "center");
      center.appendChild(el("p", "hint", text || "Загрузка…"));
      root.appendChild(center);
      mount(root);
    }

    function renderError(text, retryFn, step) {
      var root = stepRoot(step);
      var center = el("div", "center");
      center.appendChild(el("p", "error-text", text));
      var btn = el("button", "secondary-btn", "Повторить");
      btn.addEventListener("click", retryFn);
      center.appendChild(btn);
      root.appendChild(center);
      mount(root);
    }

    // Бесплатные туннели (devtunnels/ngrok/localtunnel) иногда подвисают на
    // отдельных запросах на несколько секунд — вместо того чтобы сразу
    // показывать ошибку, тихо пробуем ещё пару раз с коротким таймаутом.
    async function apiGet(path, attempt) {
      attempt = attempt || 1;
      var controller = new AbortController();
      var timeoutId = setTimeout(function () { controller.abort(); }, 6000);
      try {
        var res = await fetch(API_URL + path, { signal: controller.signal });
        clearTimeout(timeoutId);
        if (!res.ok) throw new Error("HTTP " + res.status);
        return await res.json();
      } catch (e) {
        clearTimeout(timeoutId);
        if (attempt < 3) {
          await new Promise(function (r) { setTimeout(r, 500); });
          return apiGet(path, attempt + 1);
        }
        throw e;
      }
    }

    // POST не повторяем автоматически — в отличие от чтения, отмена
    // записи/отправка отзыва не идемпотентны, повтор при флаки-сети мог бы
    // случайно продублировать действие. Но таймаут всё равно нужен: без
    // него fetch() на подвисшем туннеле не завершается вообще никогда, и
    // экран("Записываю…") зависает навсегда без единой ошибки — приходится
    // перезапускать Mini App руками. С таймаутом хотя бы будет кнопка
    // "Повторить" вместо мёртвого экрана.
    async function apiPost(path, body) {
      var controller = new AbortController();
      var timeoutId = setTimeout(function () { controller.abort(); }, 15000);
      var res;
      try {
        res = await fetch(API_URL + path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          signal: controller.signal
        });
      } catch (e) {
        throw new Error(e.name === "AbortError" ? "Сервер не отвечает — проверь соединение и попробуй ещё раз." : e.message);
      } finally {
        clearTimeout(timeoutId);
      }
      if (!res.ok) {
        var errBody = await res.json().catch(function () { return {}; });
        throw new Error(errBody.detail || ("HTTP " + res.status));
      }
      return res.json();
    }

    function getInitData() {
      return tg ? tg.initData : "";
    }

    // ---------- Telegram MainButton/BackButton ----------
    function setMainButton(text, handler) {
      if (!tg) return;
      if (mainButtonHandler) tg.MainButton.offClick(mainButtonHandler);
      mainButtonHandler = handler;
      tg.MainButton.setText(text);
      tg.MainButton.onClick(mainButtonHandler);
      tg.MainButton.show();
    }

    function hideMainButton() {
      if (!tg) return;
      if (mainButtonHandler) { tg.MainButton.offClick(mainButtonHandler); mainButtonHandler = null; }
      tg.MainButton.hide();
    }

    // Кнопка "Далее"/"Записаться": используем нативный MainButton в
    // Telegram, а вне Telegram (тест в обычном браузере) — обычную кнопку.
    function mountPrimaryAction(root, text, handler) {
      if (tg) {
        setMainButton(text, handler);
      } else {
        var btn = el("button", "primary-btn", text);
        btn.addEventListener("click", handler);
        root.appendChild(btn);
      }
    }

    function updateBackButton() {
      if (!tg) return;
      if (stepHistory.length > 0) tg.BackButton.show(); else tg.BackButton.hide();
    }

    // ---------- навигация по шагам ----------
    function goToStep(step) {
      stepHistory.push(currentStep);
      currentStep = step;
      render();
    }

    function goBack() {
      if (!stepHistory.length) return;
      currentStep = stepHistory.pop();
      render();
    }

    function resetToStep(step) {
      stepHistory = [];
      currentStep = step;
      render();
    }

    function render() {
      updateBackButton();
      hideMainButton();
      STEP_RENDERERS[currentStep]();
    }

    // ---------- главное меню ----------
    function renderMenu() {
      var root = el("div");
      root.appendChild(el("h1", null, "💈 Barber Studio"));
      root.appendChild(card({
        title: "📅 Записаться",
        subtitle: "Услуга, салон, мастер, дата и время",
        onClick: function () { goToStep("service"); }
      }));
      root.appendChild(card({
        title: "🗂 Мои записи",
        subtitle: "Посмотреть или отменить запись",
        onClick: function () { goToStep("myBookings"); }
      }));
      root.appendChild(card({
        title: "⭐ Оставить отзыв",
        subtitle: "Оценить мастера",
        onClick: function () { goToStep("reviewMaster"); }
      }));
      mount(root);
    }

    // ---------- шаг 1: услуга ----------
    async function renderServices() {
      renderLoading("Загружаю услуги…", "service");
      var services;
      try { services = await apiGet("/api/public/services"); }
      catch (e) { renderError("Не удалось загрузить услуги. Проверь, что API запущен.", renderServices, "service"); return; }

      var root = stepRoot("service");
      root.appendChild(el("h1", null, "💈 Выберите услугу"));
      services.forEach(function (s) {
        root.appendChild(card({
          photo: "assets/services/" + s.key + ".jpg",
          title: s.name,
          subtitle: s.desc,
          right: s.price + "₽",
          onClick: function () { state.service = s; goToStep("salon"); }
        }));
      });
      mount(root);
    }

    // ---------- шаг 2: салон ----------
    async function renderSalons() {
      renderLoading("Загружаю салоны…", "salon");
      var salons;
      try { salons = await apiGet("/api/public/salons"); }
      catch (e) { renderError("Не удалось загрузить салоны.", renderSalons, "salon"); return; }

      var root = stepRoot("salon");
      root.appendChild(el("h1", null, "📍 Выберите салон"));
      root.appendChild(summaryLine());
      salons.forEach(function (s) {
        root.appendChild(card({
          title: s.name,
          subtitle: s.address + "\n" + s.hours,
          onClick: function () { state.salon = s; goToStep("master"); }
        }));
      });
      mount(root);
    }

    // ---------- шаг 3: мастер ----------
    async function renderMasters() {
      renderLoading("Загружаю мастеров…", "master");
      var masters;
      try {
        masters = await apiGet("/api/public/masters?salon_key=" + encodeURIComponent(state.salon.key));
      } catch (e) { renderError("Не удалось загрузить мастеров.", renderMasters, "master"); return; }

      var root = stepRoot("master");
      root.appendChild(el("h1", null, "✂️ Выберите мастера"));
      root.appendChild(summaryLine());
      masters.forEach(function (m) {
        var ratingText = m.review_count ? ("⭐ " + m.rating + " (" + m.review_count + ")") : "Пока нет отзывов";
        root.appendChild(card({
          photo: "assets/masters/" + m.key + ".jpg",
          round: true,
          title: m.name,
          subtitle: m.spec + "\n" + ratingText,
          onClick: function () { state.master = m; goToStep("date"); }
        }));
      });
      root.appendChild(card({
        title: "🙌 Любой свободный",
        subtitle: "В салоне «" + state.salon.name + "»",
        onClick: function () {
          state.master = { key: "any", name: "Любой свободный (" + state.salon.name + ")" };
          goToStep("date");
        }
      }));
      mount(root);
    }

    // ---------- шаг 4: дата ----------
    async function renderDates() {
      renderLoading("Загружаю даты…", "date");
      var dates;
      try { dates = await apiGet("/api/public/dates"); }
      catch (e) { renderError("Не удалось загрузить даты.", renderDates, "date"); return; }

      var root = stepRoot("date");
      root.appendChild(el("h1", null, "📅 Выберите дату"));
      root.appendChild(summaryLine());
      var grid = el("div", "chip-grid");
      dates.forEach(function (d) {
        var chip = el("button", "chip", d);
        chip.addEventListener("click", function () { state.date = d; goToStep("time"); });
        grid.appendChild(chip);
      });
      root.appendChild(grid);
      mount(root);
    }

    // ---------- шаг 5: время ----------
    async function renderTimes() {
      renderLoading("Проверяю свободное время…", "time");
      var data;
      try {
        var q = "master_key=" + encodeURIComponent(state.master.key) +
          "&salon_key=" + encodeURIComponent(state.salon.key) +
          "&date=" + encodeURIComponent(state.date);
        data = await apiGet("/api/public/slots?" + q);
      } catch (e) { renderError("Не удалось загрузить время.", renderTimes, "time"); return; }

      var root = stepRoot("time");
      root.appendChild(el("h1", null, "⏰ Выберите время"));
      root.appendChild(summaryLine());

      if (!data.slots.length) {
        root.appendChild(el("p", "hint", "На эту дату свободных слотов нет — выбери другую дату."));
      } else {
        var grid = el("div", "chip-grid");
        data.slots.forEach(function (t) {
          var chip = el("button", "chip", t);
          chip.addEventListener("click", function () { state.time = t; goToStep("name"); });
          grid.appendChild(chip);
        });
        root.appendChild(grid);
      }
      mount(root);
    }

    // ---------- шаг 6: имя ----------
    function renderName() {
      var root = stepRoot("name");
      root.appendChild(el("h1", null, "👤 Как вас зовут?"));
      root.appendChild(summaryLine());

      var prefill = state.name;
      if (!prefill && tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
        var u = tg.initDataUnsafe.user;
        prefill = [u.first_name, u.last_name].filter(Boolean).join(" ");
      }

      var input = el("input", "text-input");
      input.type = "text";
      input.placeholder = "Имя";
      input.value = prefill || "";
      root.appendChild(input);

      function trySubmit() {
        var value = input.value.trim();
        if (!value) { input.focus(); return; }
        state.name = value;
        goToStep("phone");
      }
      input.addEventListener("keydown", function (e) { if (e.key === "Enter") trySubmit(); });

      mountPrimaryAction(root, "Далее", trySubmit);
      mount(root);
    }

    // ---------- шаг 7: телефон ----------
    function renderPhone() {
      var root = stepRoot("phone");
      root.appendChild(el("h1", null, "📱 Номер телефона"));
      root.appendChild(summaryLine());

      var input = el("input", "text-input");
      input.type = "tel";
      input.placeholder = "+7 900 123-45-67";
      input.value = state.phone || "";
      root.appendChild(input);

      // Бонус: попросить контакт у Telegram напрямую. Может не сработать на
      // старых клиентах или если пользователь откажет — тогда просто
      // печатает номер вручную в поле выше, это основной надёжный путь.
      if (tg && tg.requestContact) {
        var contactBtn = el("button", "secondary-btn", "📱 Отправить контакт из Telegram");
        contactBtn.addEventListener("click", function () {
          tg.requestContact(function (sent, response) {
            var phone = response && response.responseUnsafe && response.responseUnsafe.contact
              ? response.responseUnsafe.contact.phone_number
              : null;
            if (sent && phone) input.value = phone;
          });
        });
        root.appendChild(contactBtn);
      }

      function trySubmit() {
        var value = input.value.trim();
        if (!value) { input.focus(); return; }
        state.phone = value;
        goToStep("confirm");
      }
      input.addEventListener("keydown", function (e) { if (e.key === "Enter") trySubmit(); });

      mountPrimaryAction(root, "Далее", trySubmit);
      mount(root);
    }

    // ---------- шаг 8: подтверждение ----------
    function renderConfirm() {
      var root = stepRoot("confirm");
      root.appendChild(el("h1", null, "✅ Проверьте запись"));

      var summary = el("div", "summary-box");
      summary.appendChild(summaryRow("Услуга", state.service.name + " — " + state.service.price + "₽"));
      summary.appendChild(summaryRow("Салон", state.salon.name + "\n" + state.salon.address));
      summary.appendChild(summaryRow("Мастер", state.master.name));
      summary.appendChild(summaryRow("Когда", state.date + " в " + state.time));
      summary.appendChild(summaryRow("Имя", state.name));
      summary.appendChild(summaryRow("Телефон", state.phone));
      root.appendChild(summary);

      root.appendChild(el("p", "hint", "Нажми «Записаться» — запись сразу попадёт в CRM, и придёт подтверждение в чат."));

      mountPrimaryAction(root, "✅ Записаться", submitBooking);
      mount(root);
    }

    async function submitBooking() {
      var payload = {
        init_data: getInitData(),
        service_key: state.service.key,
        salon_key: state.salon.key,
        master_key: state.master.key,
        date: state.date,
        time: state.time,
        name: state.name,
        phone: state.phone
      };
      hideMainButton();
      renderLoading("Записываю…", "confirm");
      try {
        var result = await apiPost("/api/public/book", payload);
        state.bookingResult = result;
        goToStep("done");
      } catch (e) {
        renderError(e.message || "Не удалось записаться. Попробуй ещё раз.", function () { goToStep("confirm"); });
      }
    }

    function renderDone() {
      var root = el("div", "center");
      root.appendChild(el("p", null, "✅"));
      root.appendChild(el("h1", null, "Готово!"));
      var r = state.bookingResult || {};
      root.appendChild(el("p", "hint",
        "Вы записаны: " + (r.service_name || state.service.name) + " к " + (r.master_name || state.master.name) +
        "\n" + state.date + " в " + state.time));
      var btn = el("button", "secondary-btn", "В меню");
      btn.addEventListener("click", function () { resetToStep("menu"); });
      root.appendChild(btn);
      mount(root);
    }

    function renderTelegramOnly() {
      var root = el("div", "center");
      root.appendChild(el("p", "hint", "Доступно только внутри Telegram."));
      mount(root);
    }

    // ---------- мои записи ----------
    async function renderMyBookings() {
      if (!tg) { renderTelegramOnly(); return; }

      renderLoading("Загружаю твои записи…");
      var bookings;
      try {
        bookings = await apiGet("/api/public/my-bookings?init_data=" + encodeURIComponent(getInitData()));
      } catch (e) { renderError("Не удалось загрузить записи.", renderMyBookings); return; }

      var root = el("div");
      root.appendChild(el("h1", null, "🗂 Мои записи"));

      if (!bookings.length) {
        root.appendChild(el("p", "hint", "Активных записей пока нет."));
      } else {
        bookings.forEach(function (b) {
          var box = el("div", "summary-box");
          box.appendChild(summaryRow(b.service, b.master + "\n" + b.salon));
          box.appendChild(summaryRow("Когда", b.date + " в " + b.time));
          var cancelBtn = el("button", "secondary-btn", "Отменить запись");
          cancelBtn.addEventListener("click", function () { cancelMyBooking(b.id); });
          box.appendChild(cancelBtn);
          root.appendChild(box);
        });
      }
      mount(root);
    }

    async function cancelMyBooking(id) {
      try {
        await apiPost("/api/public/my-bookings/cancel", { init_data: getInitData(), booking_id: id });
        renderMyBookings();
      } catch (e) {
        alert(e.message || "Не удалось отменить запись");
      }
    }

    // ---------- отзыв: выбор мастера ----------
    async function renderReviewMaster() {
      if (!tg) { renderTelegramOnly(); return; }

      renderLoading("Загружаю мастеров…");
      var masters;
      try { masters = await apiGet("/api/public/masters/all"); }
      catch (e) { renderError("Не удалось загрузить мастеров.", renderReviewMaster); return; }

      var root = el("div");
      root.appendChild(el("h1", null, "⭐ Кого оцениваем?"));
      masters.forEach(function (m) {
        root.appendChild(card({
          photo: "assets/masters/" + m.key + ".jpg",
          round: true,
          title: m.name,
          subtitle: m.salon_name,
          onClick: function () { state.reviewMaster = m; goToStep("reviewRating"); }
        }));
      });
      mount(root);
    }

    // ---------- отзыв: оценка ----------
    function renderReviewRating() {
      var root = el("div");
      root.appendChild(el("h1", null, "Оцените мастера " + state.reviewMaster.name));
      var grid = el("div", "chip-grid");
      [1, 2, 3, 4, 5].forEach(function (n) {
        var chip = el("button", "chip", "⭐".repeat(n));
        chip.addEventListener("click", function () {
          state.reviewRating = n;
          goToStep("reviewComment");
        });
        grid.appendChild(chip);
      });
      root.appendChild(grid);
      mount(root);
    }

    // ---------- отзыв: комментарий ----------
    function renderReviewComment() {
      var root = el("div");
      root.appendChild(el("h1", null, "Комментарий (необязательно)"));

      var input = el("textarea", "text-input");
      input.rows = 3;
      input.placeholder = "Например: всё понравилось, мастер супер!";
      root.appendChild(input);

      mountPrimaryAction(root, "Отправить отзыв", function () {
        submitReview(input.value.trim() || null);
      });
      mount(root);
    }

    async function submitReview(comment) {
      try {
        await apiPost("/api/public/reviews", {
          init_data: getInitData(),
          master_key: state.reviewMaster.key,
          rating: state.reviewRating,
          comment: comment
        });
        resetToStep("reviewDone");
      } catch (e) {
        alert(e.message || "Не удалось отправить отзыв");
      }
    }

    function renderReviewDone() {
      var root = el("div", "center");
      root.appendChild(el("p", null, "Спасибо за отзыв! 🙌"));
      var btn = el("button", "primary-btn", "В меню");
      btn.addEventListener("click", function () { resetToStep("menu"); });
      root.appendChild(btn);
      mount(root);
    }

    var STEP_RENDERERS = {
      menu: renderMenu,
      service: renderServices,
      salon: renderSalons,
      master: renderMasters,
      date: renderDates,
      time: renderTimes,
      name: renderName,
      phone: renderPhone,
      confirm: renderConfirm,
      done: renderDone,
      myBookings: renderMyBookings,
      reviewMaster: renderReviewMaster,
      reviewRating: renderReviewRating,
      reviewComment: renderReviewComment,
      reviewDone: renderReviewDone
    };

    if (tg) {
      tg.ready();
      tg.expand();
      tg.BackButton.onClick(goBack);
    }
    render();
  </script>
</body>
</html>
