<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Запись — Barber Studio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #111111);
  }
  h1 {
    font-size: 20px;
    margin: 8px 0 4px;
  }
  .hint {
    color: var(--tg-theme-hint-color, #999999);
    font-size: 14px;
    margin-bottom: 20px;
  }
  .service {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: none;
    border-radius: 12px;
    background: var(--tg-theme-button-color, #2ea6ff);
    color: var(--tg-theme-button-text-color, #ffffff);
    font-size: 16px;
    text-align: left;
    cursor: pointer;
  }
  .service:active {
    opacity: 0.8;
  }
  .service .price {
    font-weight: 600;
    white-space: nowrap;
    margin-left: 12px;
  }
  #status {
    margin-top: 16px;
    font-size: 14px;
    color: var(--tg-theme-hint-color, #999999);
  }
</style>
</head>
<body>
  <h1>💈 Выберите услугу</h1>
  <p class="hint">Дальше — выбор салона, мастера, даты и времени прямо в чате с ботом.</p>

  <div id="services"></div>
  <p id="status"></p>

  <script>
    var tg = window.Telegram ? window.Telegram.WebApp : null;

    // Захардкожено для демо, ключи совпадают с database/data.py (SERVICES_LIST).
    // Когда подключим БД — список можно будет запрашивать динамически.
    var SERVICES = [
      { key: "haircut", name: "Стрижка", price: 1500 },
      { key: "haircut_beard", name: "Стрижка + борода", price: 2200 },
      { key: "beard", name: "Оформление бороды", price: 900 },
      { key: "kids", name: "Детская стрижка", price: 1000 }
    ];

    if (tg) {
      tg.ready();
      tg.expand();
    }

    var container = document.getElementById("services");
    var status = document.getElementById("status");

    SERVICES.forEach(function (service) {
      var btn = document.createElement("button");
      btn.className = "service";
      btn.innerHTML = "<span>" + service.name + "</span>" +
        "<span class=\"price\">" + service.price + "₽</span>";
      btn.addEventListener("click", function () {
        selectService(service);
      });
      container.appendChild(btn);
    });

    function selectService(service) {
      var payload = JSON.stringify({ service_key: service.key });

      if (!tg) {
        status.textContent = "Открыто вне Telegram — sendData недоступен. Payload: " + payload;
        return;
      }

      tg.sendData(payload);
    }
  </script>
</body>
</html>
